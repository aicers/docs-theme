name: Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libcairo2 libffi-dev
          pip install mkdocs-material mkdocs-static-i18n mkdocs-with-pdf

      - name: Build HTML samples
        run: |
          mkdir -p site
          cp samples/index.html site/
          for sample_dir in samples/*/; do
            name="$(basename "$sample_dir")"
            if [ -f "$sample_dir/mkdocs.yml" ]; then
              mkdocs build -f "$sample_dir/mkdocs.yml" -d "../../site/$name"
            fi
          done

      - name: Build PDFs
        run: |
          mkdir -p site/pdf
          for sample_dir in samples/*/; do
            name="$(basename "$sample_dir")"
            if [ ! -f "$sample_dir/mkdocs.yml" ]; then
              continue
            fi
            template_pdf="templates/$name/pdf"
            if [ ! -d "$template_pdf" ]; then
              continue
            fi
            for locale in en ko; do
              if [ ! -d "$sample_dir/docs/$locale" ]; then
                continue
              fi
              python3 scripts/ci-build-pdf.py \
                --sample "$sample_dir" \
                --template "$name" \
                --locale "$locale" \
                --output "site/pdf/${name}.${locale}.pdf"
            done
          done

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy Docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
